# cargo-audit configuration for rsiprtp
#
# Mirrors the advisory ignores in `deny.toml` so local `cargo audit` runs
# match CI's `cargo deny check` output. Each ignore must cite a
# justification; re-evaluate when upstream publishes a fix.

[advisories]
ignore = [
    # RUSTSEC-2023-0071 (rsa): Marvin Attack timing sidechannel. The `rsa`
    # crate is a DEV-only direct dep used by transport-layer tests to
    # generate test PKCS#1 keys for PEM parsing. Test path does no RSA
    # decryption and faces no attacker-controlled ciphertexts, so the
    # vulnerability is unreachable. No upstream fix available yet
    # (tracked at https://github.com/RustCrypto/RSA/issues/626).
    # Re-check on rsa >=0.10.
    "RUSTSEC-2023-0071",

    # RUSTSEC-2026-0119 (hickory-proto): O(n²) name compression in the
    # encoder path. rsiprtp uses hickory-resolver as a stub resolver:
    # we encode small outbound queries (1-3 records) and only decode
    # responses; we never re-encode many-record messages, so the
    # amplification surface is unreachable. Fix requires
    # hickory-resolver 0.26+ (breaking API); migration tracked separately.
    "RUSTSEC-2026-0119",
]
