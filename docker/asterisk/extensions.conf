; Dialplan for mdsiprtp integration testing

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

[testing]
; Echo test - echoes audio back to caller
exten => *43,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Milliwatt test tone (1004 Hz)
exten => *42,1,NoOp(Milliwatt test)
 same => n,Answer()
 same => n,Milliwatt()

; Music on hold test
exten => *41,1,NoOp(Music on hold test)
 same => n,Answer()
 same => n,MusicOnHold(default,60)
 same => n,Hangup()

; DTMF test - plays back received digits
exten => *44,1,NoOp(DTMF test)
 same => n,Answer()
 same => n,Read(digits,beep,10,s,5)
 same => n,SayDigits(${digits})
 same => n,Hangup()

; Auto-answer test (answers after 2 seconds)
exten => *45,1,NoOp(Auto-answer test)
 same => n,Wait(2)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Wait(5)
 same => n,Hangup()

; Conference room for multi-party testing
exten => *50,1,NoOp(Conference room)
 same => n,Answer()
 same => n,ConfBridge(1)
 same => n,Hangup()

; Direct dial to endpoints
exten => 1001,1,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 1002,1,Dial(PJSIP/1002,30)
 same => n,Hangup()

exten => 1003,1,Dial(PJSIP/1003,30)
 same => n,Hangup()

; Voicemail simulation
exten => *99,1,NoOp(Voicemail simulation)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(vm-intro)
 same => n,Record(/tmp/vm_%{UNIQUEID}.wav,3,30,k)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; Transfer target for testing
exten => *70,1,NoOp(Transfer target)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Wait(30)
 same => n,Hangup()

; Park for attended transfer testing
exten => 700,1,Park()

; Catch all invalid extensions
exten => i,1,NoOp(Invalid extension)
 same => n,Congestion()
