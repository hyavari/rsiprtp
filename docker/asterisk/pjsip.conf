; PJSIP configuration for mdsiprtp integration testing

; === Transport Configuration ===

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; === Test User 1001 ===

[1001]
type=aor
max_contacts=5
qualify_frequency=30
remove_existing=yes

[1001]
type=auth
auth_type=userpass
username=1001
password=test1001

[1001]
type=endpoint
context=testing
disallow=all
allow=ulaw,alaw,g722,opus
auth=1001
aors=1001
direct_media=no

