; PJSIP configuration for mdsiprtp integration testing
; This config provides endpoints for testing basic SIP operations

; === Transport Configuration ===

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; === Test Endpoints ===

; Test user 1001 - basic authentication
[1001]
type=endpoint
context=testing
disallow=all
allow=ulaw,alaw,g722,opus
auth=auth1001
aors=aor1001
direct_media=no

[auth1001]
type=auth
auth_type=userpass
username=1001
password=test1001

[aor1001]
type=aor
max_contacts=5
qualify_frequency=30
remove_existing=yes

; Test user 1002 - for call transfer testing
[1002]
type=endpoint
context=testing
disallow=all
allow=ulaw,alaw,g722,opus
auth=auth1002
aors=aor1002
direct_media=no

[auth1002]
type=auth
