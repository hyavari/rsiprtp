# Gabby Voice AI Configuration
# Copy this file to gabby.toml and customize as needed

[server]
# Address to bind SIP socket
sip_host = "0.0.0.0"
# SIP listening port
sip_port = 5060
# Starting port for RTP streams (each call uses one port)
rtp_port_start = 10000
# Public IP to advertise in SDP (auto-detect if not set)
# public_ip = "192.168.1.100"

[stt]
# Path to Vosk speech recognition model
# Download with: ./scripts/setup.sh
model_path = "./models/vosk-model-small-en-us-0.15"
# Sample rate (Vosk expects 16000)
sample_rate = 16000

[llm]
# Ollama API endpoint
endpoint = "http://localhost:11434"
# Model to use (pull with: ollama pull llama3.2:3b)
model = "llama3.2:3b"
# System prompt defining Gabby's personality
system_prompt = """
You are Gabby, a friendly and helpful voice assistant.
Keep responses concise and natural for spoken conversation.
Avoid markdown, bullet points, or formatting.
Respond in 1-3 sentences.
"""
# Temperature for response generation (0.0-1.0)
temperature = 0.7
# Maximum tokens in response
max_tokens = 150
# Request timeout in seconds
timeout_secs = 30

[tts]
# Path to Piper TTS binary
piper_binary = "/usr/local/bin/piper"
# Path to Piper voice model (ONNX format)
model_path = "./models/en_US-amy-medium.onnx"
# Path to Piper model config
config_path = "./models/en_US-amy-medium.onnx.json"
# Output sample rate of the TTS model
sample_rate = 22050

[vad]
# RMS energy threshold for silence detection (0.0-1.0)
# Lower values = more sensitive to quiet speech
silence_threshold = 0.02
# Duration of silence (ms) to consider end of utterance
# Shorter = faster response, but may cut off speaker
silence_duration_ms = 700
# Minimum utterance duration (ms) before accepting
# Prevents triggering on short noises
min_utterance_ms = 500
